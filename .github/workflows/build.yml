name: Build installers

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS installers
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Bundle Chromium for Windows
        shell: pwsh
        run: |
          $exePath = node -e "const p=require('playwright');console.log(p.chromium.executablePath())"
          # Go up to the chromium-XXXX directory
          $chromeDir = Split-Path (Split-Path (Split-Path $exePath))
          $chromiumVersionDir = Split-Path $chromeDir
          Write-Host "Chromium version dir: $chromiumVersionDir"
          Write-Host "Contents:"
          Get-ChildItem $chromiumVersionDir -Recurse -Depth 2 | Select-Object FullName
          New-Item -ItemType Directory -Force -Path playwright-browsers | Out-Null
          Copy-Item -Recurse $chromiumVersionDir "playwright-browsers/"
          Write-Host "Bundled:"
          Get-ChildItem playwright-browsers -Recurse -Depth 2 | Select-Object FullName

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip installer
        run: Compress-Archive -Path "dist\JobSifter-Setup-*.exe" -DestinationPath "dist\JobSifter-Setup-Windows.zip"
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/*.zip
